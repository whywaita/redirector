version: 2

project_name: redirector

before:
  hooks:
    - go mod tidy

builds:
  - id: redirector
    binary: redirector
    main: .
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ['tar.gz']
    wrap_in_directory: true
    format_overrides:
      - goos: darwin
        formats: ['zip']
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: '{{ .ProjectName }}-{{ .Version }}-checksums.txt'

dockers:
  - id: redirector
    image_templates:
      - "ghcr.io/whywaita/redirector:{{ .Version }}"
      - "ghcr.io/whywaita/redirector:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--platform=linux/arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - '(?i)^docs?:'
      - '(?i)^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: whywaita
    name: redirector
